name: Pull Request Checks

on:
  pull_request:
    branches:
      - master

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            API/package-lock.json
            Frontend/package-lock.json

      - name: Install API dependencies
        working-directory: ./API
        run: npm install --legacy-peer-deps

      - name: Lint API (if configured)
        working-directory: ./API
        run: npm run lint --if-present || echo "No lint script found, skipping..."

      - name: Test API
        working-directory: ./API
        run: npm test --if-present || echo "No tests found, skipping..."

      - name: Build API
        working-directory: ./API
        run: npm run build

      - name: Install Frontend dependencies
        working-directory: ./Frontend
        run: npm install --legacy-peer-deps

      - name: Lint Frontend (if configured)
        working-directory: ./Frontend
        run: npm run lint --if-present || echo "No lint script found, skipping..."

      - name: Test Frontend
        working-directory: ./Frontend
        run: npm test --if-present || echo "No tests found, skipping..."

      - name: Build Frontend
        working-directory: ./Frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const message = status === 'success'
              ? '✅ All checks passed! Ready for review.'
              : '❌ Some checks failed. Please review the logs.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
